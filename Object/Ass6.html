<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1 class="text-center bg-dark text-light p-3">Task Management</h1>
    <div>
        <div class="container d-flex flex-row gap-3 mt-5 justify-content-center">
            <input type="text" class="form-control fs-4 w-50" placeholder="Enter task name" id="taskInput">
            <button class="btn btn-primary fs-4" onclick="addTask()">Add Task</button>
        </div>
        <div class="container d-flex flex-column gap-3 mt-5 justify-content-center text-dark">
            <h3 class="text-center">Tasks:</h3>
            <div id="taskList" class="list-group d-flex flex-column gap-2 "></div>
        </div>

    </div>

    <script src="Ass6.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

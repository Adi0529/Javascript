<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h2 class="p-5 text-center">Simple Calculator</h2>
    <div class="container d-flex flex-row gap-5 mt-5 justify-content-center">
        <div>
            <input type="number" class="form-control fs-4" placeholder="Enter num1" id="input1">
        </div>
        <div>
            <input type="number" class="form-control fs-4" placeholder="Enter num2" id="input2">
        </div>
    </div>
    <div class="container d-flex flex-row gap-5 mt-5 justify-content-center">
        <button class="btn btn-primary fs-4" onclick="calculate('add')">Add</button>
        <button class="btn btn-secondary fs-4" onclick="calculate('subtract')">Subtract</button>
        <button class="btn btn-success fs-4" onclick="calculate('multiply')">Multiply</button>
        <button class="btn btn-danger fs-4" onclick="calculate('divide')">Divide</button>
    </div>
    <div class="container d-flex flex-row gap-5 mt-5 justify-content-center text-dark">
        <h3 id="result" class="text-center"></h3>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="Ass4.js"></script>
  </body>
</html>

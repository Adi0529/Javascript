<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="d-flex bg-primary align-items-center">
    <div class="container p-5 bg-light mt-5 " style="max-width: 500px;"  >
        <h2 class="text-center">Login</h2>
        <div class="mb-3">
            <label for="useremailid" class="form-label">Email address</label>
            <input type="email" class="form-control" id="useremailid" aria-describedby="emailHelp" value="lion">
            <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div>
        <div class="mb-3">
            <label for="InputPassword1" class="form-label">Password</label>
            <input type="password" class="form-control" id="InputPassword1">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>
        <button type="button" class="btn btn-primary" onclick="login()">Submit</button>

    </div>

    <script>
        function login(){
            emaildb='aditya@gmail.com'
            pass='adi0529'
            emailid=document.getElementById('useremailid').value
            password=document.getElementById('InputPassword1').value
            if(emaildb == emailid)
            {
                if(pass==password)
                {
                    alert('login successfully')
                    window.location.href= './Next.html'
                }
                else
                {
                    alert('password is incorrect')
                    document.getElementById('InputPassword1').value=''

                }
            }
            else{
                alert('incorrect email id')
                document.getElementById('useremailid').value=''
            }
        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>

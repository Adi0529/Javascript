<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <Style>
        .item {
            padding: 10px 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
            background: #fff;
            transition: 0.3s;
        }

        .highlight {
            background-color: #ffeb3b !important;
            border-color: #fbc02d !important;
            transform: scale(1.1);
            font-weight: bold;
        }
    </Style>
</head>

<body>
    <h2 class="text-center p-4 bg-dark text-light">Search in an array</h2>
    <div class="d-flex flex-column gap-3 mt-5">
        <input type="text" class="p-3 fs-4 border-3 rounded-3 mx-auto" id="inputval" placeholder="Enter a brand name">
        <button class="btn btn-primary mx-auto border" onclick="search()">Search</button>
    </div>
    <div class="d-flex flex-row gap-3 justify-content-center mt-5" id="result"></div>
    <p class="text-center pt-5" id="status"></p>

    <Script src="Script.js"></Script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>

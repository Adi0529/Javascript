<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDoLIst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container mt-5 d-flex flex-column align-items-center gap-3">
      <h1 class="text-center mb-4">ToDo List</h1>
      <div class="input-group mb-3">
        <input type="text" id="taskInput" class="form-control mx-auto fs-4 p-2 border-3" placeholder="Enter a new task" style="max-width: 600px;">
        
      </div>
      <button class="btn btn-primary" id="addTaskBtn" onclick="Addtask()">Add Task</button>
      <ul class="list-group" class="border-2" id="taskList"></ul>
    </div>


    <script src="Script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h2 class="text-center p-3">Filter Even and Odd Numbers</h2>
    <div class="container mt-4 mx-auto d-flex flex-column gap-3 " style="max-width: 50%;">
        <input type="number" id="numberInput" class="form-control border-3 mx-auto" placeholder="Enter a number" style="max-width: 50%;">
        <div class="d-flex flex-row gap-3 justify-content-center">
        <button onclick="addNumber()" class="btn btn-success mt-2">Add Number</button>
        <button onclick="filterEven()" class="btn btn-primary mt-2">Filter Even</button>
        <button onclick="filterOdd()" class="btn btn-primary mt-2">Filter Odd</button>
        <button onclick="resetNumbers()" class="btn btn-secondary mt-2">Reset</button>
        </div>
    </div>
    <div id="evenResult" class="mt-3 container text-center bg-success text-light p-3 d-flex flex-row gap-3"></div>
    <div id="oddResult" class="mt-3 container text-center bg-danger text-light p-3 d-flex flex-row gap-3"></div>
    <script src="Script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

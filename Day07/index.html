<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header class="display-2 text-center text-primary">STRING OPERATIONS</header>
    <div class="container text-center pt-5">
        <input type="text" class="form-control w-50 mx-auto fs-4 p-2"  id="inputpara" placeholder="Add Paragraph Here">
    </div>
    <div class=" bg-secondary text-light mx-auto mt-5 mb-5 rounded-pill px-5 py-3 fs-3 mb-5 text-center"
        style="max-width: 50%; height: 160px;" >
        <p id="result1" ></p>
    </div>
    <div class="container text-center">
        <div class="row row-cols-2 row-cols-lg-4 g-2 g-lg-3">
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="countvowels()">Check vowels</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="consonents()">Check consonents</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="spaces()">Count Spaces</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="newline()">Count new lines</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="lower()">lower case</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="capietal()">Capetalize</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="titlecase()">Title case</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="palindrome()">Palindrome</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="firstword()">Extract First Word</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="hypen()">Replace spaces with hypens</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="reverse()">Reverse Characters</button>
            </div>
            <div class="col">
                <button class="btn border border-secondary border-dark rounded-3 w-50" onclick="sortchar()">Sort the words</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="Scripts.js"></script>
</body>

</html>
